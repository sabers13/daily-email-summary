name: Daily Email Summary

# GitHub cron is UTC-only and ignores DST, and scheduled runs are best-effort:
# GitHub frequently DELAYS them by 1-3 hours under load. A single cron with no
# clock gate is therefore the only reliable design — the digest always runs
# once a day; its arrival time just drifts ~1h between summer/winter and by
# however long GitHub's queue is backed up. That's fine for a morning digest.
#
# 05:00 UTC = 07:00 Berlin (summer/CEST) or 06:00 Berlin (winter/CET). Adjust
# the cron for your own timezone.
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:       # manual "Run workflow" button

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10    # retries with backoff need more headroom than 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "openai>=1.40" "requests>=2.31,<3"

      - name: Run digest
        env:
          # IMAP host is not secret; store it as a repo *variable*
          # (Settings → Secrets and variables → Actions → Variables).
          IMAP_SERVER: ${{ vars.IMAP_SERVER }}
          TU_USER: ${{ secrets.TU_USER }}
          TU_PASS: ${{ secrets.TU_PASS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional repo *variable* (Settings → Secrets and variables →
          # Actions → Variables). "always" (default) or "urgent".
          NOTIFY_MODE: ${{ vars.NOTIFY_MODE }}
        run: python check_unimail_gpt.py
